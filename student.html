<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Attendance Management System</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f4f4f4;
        margin:0;
        padding:20px;
    }

    .container{
        max-width:800px;
        margin:auto;
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,.2);
    }

    h2{
        text-align:center;
        color:#333;
    }

    input{
        padding:10px;
        width:60%;
        font-size:16px;
    }

    button{
        padding:10px 15px;
        cursor:pointer;
        border:none;
        border-radius:5px;
        background:#007bff;
        color:white;
        margin:5px;
    }

    button:hover{
        background:#0056b3;
    }

    table{
        width:100%;
        border-collapse:collapse;
        margin-top:20px;
    }

    table,th,td{
        border:1px solid #ddd;
    }

    th,td{
        padding:12px;
        text-align:center;
    }

    th{
        background:#007bff;
        color:white;
    }

    .present{
        color:green;
        font-weight:bold;
    }

    .absent{
        color:red;
        font-weight:bold;
    }

    #summary{
        margin-top:20px;
        font-size:18px;
        font-weight:bold;
        text-align:center;
    }

</style>
</head>

<body>

<div class="container">

<h2>Student Attendance Management System</h2>

<input type="text" id="studentName" placeholder="Enter Student Name">
<button onclick="addStudent()">Add Student</button>

<table id="attendanceTable">
<thead>
<tr>
<th>Roll No</th>
<th>Student Name</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody>

</tbody>
</table>

<div id="summary">
Present: 0 | Absent: 0 | Attendance: 0%
</div>

</div>

<script>

let roll=1;

function addStudent(){

let name=document.getElementById("studentName").value;

if(name==""){
alert("Please enter student name");
return;
}

let table=document.getElementById("attendanceTable").getElementsByTagName("tbody")[0];

let row=table.insertRow();

row.insertCell(0).innerHTML=roll++;

row.insertCell(1).innerHTML=name;

row.insertCell(2).innerHTML="<span class='absent'>Absent</span>";

row.insertCell(3).innerHTML=
"<button onclick='toggleAttendance(this)'>Mark Present</button>";

document.getElementById("studentName").value="";

updateSummary();

}

function toggleAttendance(btn){

let statusCell=btn.parentNode.parentNode.cells[2];

if(statusCell.innerText=="Absent"){

statusCell.innerHTML="<span class='present'>Present</span>";

btn.innerHTML="Mark Absent";

}else{

statusCell.innerHTML="<span class='absent'>Absent</span>";

btn.innerHTML="Mark Present";

}

updateSummary();

}

function updateSummary(){

let rows=document.querySelectorAll("#attendanceTable tbody tr");

let present=0;

let absent=0;

rows.forEach(row=>{

let status=row.cells[2].innerText;

if(status=="Present")
present++;
else
absent++;

});

let total=present+absent;

let percent=total==0?0:((present/total)*100).toFixed(2);

document.getElementById("summary").innerHTML=
`Present: ${present} | Absent: ${absent} | Attendance: ${percent}%`;

}

</script>

</body>
</html>
